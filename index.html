<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>바둑 트레이너 v3</title>
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="바둑트레이너" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f3f4f6; --card:#fff; --text:#111827; --muted:#6b7280; --line:#d1d5db;
      --accent:#111827; --wood:#d4a15d; --good:#059669; --bad:#dc2626;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
    body{padding-top:var(--safe-top)}
    .app{max-width:1200px;margin:0 auto;padding:12px 12px calc(84px + var(--safe-bottom))}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .title{font-size:24px;font-weight:800;line-height:1.2}
    .subtitle{font-size:12px;color:var(--muted);margin-top:4px}
    .desktop-layout{display:grid;grid-template-columns:280px 1fr;gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 10px 25px rgba(0,0,0,0.04)}
    .menu button,.btn{display:block;width:100%;border:none;background:#f9fafb;border:1px solid var(--line);padding:14px 14px;border-radius:14px;text-align:left;font-weight:700;color:var(--text);cursor:pointer;font-size:15px}
    .menu button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .menu button+button,.stack>*+*{margin-top:10px}
    .muted{color:var(--muted)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .stat{padding:14px;border-radius:16px;background:#f9fafb;border:1px solid var(--line)}
    .stat .n{font-size:24px;font-weight:800}
    .space{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700}
    .badge.ok{background:#ecfdf5;color:#065f46}
    .badge.warn{background:#fff7ed;color:#9a3412}
    .section-title{font-size:19px;font-weight:800;margin:0 0 12px}
    .lesson-item,.quiz-item{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fafafa;cursor:pointer}
    .lesson-item.active,.quiz-item.active{outline:2px solid #111827}
    .small{font-size:12px}
    .board-wrap{overflow:auto;padding:8px;background:#fff;border-radius:16px;border:1px solid var(--line)}
    canvas{background:#d4a15d;touch-action:none;border-radius:16px;display:block;width:100%;max-width:760px;height:auto;margin:0 auto}
    .pillbar{display:flex;gap:8px;flex-wrap:wrap}
    .pillbar button{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:999px;cursor:pointer;font-weight:700}
    .pillbar button.active{background:#111827;color:#fff;border-color:#111827}
    .hint{padding:12px 14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:14px;line-height:1.55}
    .answer{padding:12px 14px;border-radius:14px;line-height:1.6}
    .answer.good{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46}
    .answer.bad{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
    input[type=text]{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);font-size:16px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap}
    .toolbar .btn{width:auto;text-align:center;background:#111827;color:#fff;border-color:#111827;min-height:46px}
    .btn.secondary{background:#fff;color:#111827}
    .list{padding-left:18px;line-height:1.7}
    .two-col{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
    .mobile-nav{display:none}
    .mobile-nav-inner{position:fixed;left:0;right:0;bottom:0;padding:8px 10px calc(8px + var(--safe-bottom));background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:50}
    .mobile-nav-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .mobile-tab{border:1px solid var(--line);background:#fff;border-radius:14px;padding:8px 4px;font-size:11px;font-weight:700;text-align:center;line-height:1.2;cursor:pointer;min-height:54px;display:flex;align-items:center;justify-content:center}
    .mobile-tab.active{background:#111827;color:#fff;border-color:#111827}
    .sticky-tools{position:sticky;top:8px;z-index:10}
    .notice{padding:10px 12px;border-radius:12px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:13px;line-height:1.5}
    @media (max-width:900px){
      .desktop-layout,.two-col,.grid2,.grid3{grid-template-columns:1fr}
      .title{font-size:22px}
      .app{padding:10px 10px calc(92px + var(--safe-bottom))}
      .desktop-menu{display:none}
      .mobile-nav{display:block}
      .card{padding:12px}
      .section-title{font-size:18px}
      .topbar{margin-bottom:10px}
    }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const STORAGE_KEY = 'baduk_trainer_v3_state';

const lectures = [
  {id:'l1', title:'활로의 개념', level:'기초', content:['활로는 돌 또는 연결된 돌무리가 숨 쉴 수 있는 빈 칸입니다.','상대가 내 활로를 모두 막으면 그 돌은 잡힙니다.','바둑의 가장 기본은 활로를 계산하는 습관입니다.']},
  {id:'l2', title:'단수와 응수', level:'기초', content:['상대 돌의 활로가 1개만 남은 상태를 단수라고 합니다.','단수를 당하면 보통 연결하거나 상대를 역단수하는 식으로 대응합니다.','단수는 공격과 방어를 동시에 배우는 핵심 개념입니다.']},
  {id:'l3', title:'연결과 절단', level:'중급 입문', content:['연결은 내 돌의 안전을 키우고, 절단은 상대를 약하게 만듭니다.','무조건 큰 곳보다 끊기는 곳을 먼저 보는 습관이 중요합니다.','실전에서는 약한 돌, 끊기는 점, 두터운 방향을 같이 봐야 합니다.']},
  {id:'l4', title:'축의 기본', level:'중급 입문', content:['축은 상대 돌을 비스듬히 몰아 잡는 전형적 수법입니다.','축은 길이 열려 있는지, 중간에 축머리가 있는지 확인해야 합니다.','실전에서 축을 읽는 힘은 전투 정확도를 크게 올려줍니다.']},
  {id:'l5', title:'형세 판단의 시작', level:'중급 입문', content:['당장 집이 많아 보여도 약한 돌이 많으면 형세가 나쁠 수 있습니다.','집, 세력, 약한 돌, 선후수 네 가지를 함께 보아야 합니다.','초반에는 작게 이득 보기보다 판 전체 방향이 더 중요할 때가 많습니다.']}
];

const quizzes = [
  {id:'q1', title:'활로 계산 1', question:'검은 돌 한 점이 모서리에 단독으로 있을 때 기본 활로 수는?', choices:['1개','2개','3개','4개'], correct:1, explanation:'모서리의 단독 돌은 인접한 점이 두 곳뿐이라 활로가 2개입니다.'},
  {id:'q2', title:'단수 대응', question:'내 돌이 단수를 당했을 때 가장 먼저 확인할 것은?', choices:['집 수','활로 추가 가능 여부','끝내기','패만 보기'], correct:1, explanation:'단수 대응의 핵심은 즉시 활로를 늘리거나 반격이 가능한지 확인하는 것입니다.'},
  {id:'q3', title:'절단 감각', question:'상대 두 돌무리 사이가 약하게 이어져 있을 때 우선 체크할 것은?', choices:['귀 정석 암기','끊는 수 존재 여부','덤 계산','계가 시간'], correct:1, explanation:'중급 입문 단계에서는 약한 연결을 찾아 끊는 감각을 기르는 것이 중요합니다.'},
  {id:'q4', title:'축 이해', question:'축이 성립하지 않는 대표 이유는?', choices:['덤이 부족해서','중앙이라서','축머리 돌이 있어서','선수라서'], correct:2, explanation:'축 진행 경로 중간에 상대를 구출하는 축머리 돌이 있으면 축이 깨집니다.'},
  {id:'q5', title:'형세 판단', question:'형세 판단에서 집만 보고 위험한 이유는?', choices:['집은 항상 같아서','약한 돌과 세력을 반영 못해서','집은 계산 불가라서','중반엔 집이 없어서'], correct:1, explanation:'형세는 집뿐 아니라 약한 돌, 세력, 공격권도 함께 봐야 합니다.'},
  {id:'q6', title:'복습 전략', question:'오답노트의 가장 큰 목적은?', choices:['틀린 문제 숨기기','다시 틀리기','약점 유형 반복 보완','단순 점수 올리기'], correct:2, explanation:'오답노트는 약점 유형을 반복 훈련해 실수를 줄이는 데 목적이 있습니다.'}
];

const defaultState = {
  user: {name:'', loggedIn:false},
  progress: {completedLectures:[], solvedQuizzes:[], correctCount:0, wrongCount:0},
  notes: [],
  game: {moves:[], currentTurn:'black', mode:'tutor', boardSize:19, lastComment:'설명형 AI가 기본으로 켜져 있습니다.'},
  activeView: 'dashboard',
  selectedLecture: 'l1',
  selectedQuiz: 'q1',
  quizResult: null
};

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? {...structuredClone(defaultState), ...JSON.parse(raw)} : structuredClone(defaultState);
  }catch(e){ return structuredClone(defaultState); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();

function percent(){ const total = quizzes.length || 1; return Math.round((state.progress.solvedQuizzes.length / total)*100); }
function weaknessText(){
  if(state.progress.wrongCount >= 3) return '약점 유형: 단수 대응 / 형세 판단';
  if(state.progress.wrongCount >= 1) return '약점 유형: 축 / 절단';
  return '약점 유형: 아직 데이터 부족';
}
function nextLecture(){ return lectures.find(l=>!state.progress.completedLectures.includes(l.id)) || lectures[0]; }
function nextQuiz(){ return quizzes.find(q=>!state.progress.solvedQuizzes.includes(q.id)) || quizzes[0]; }

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div>
        <div class="title">바둑 트레이너 v3</div>
        <div class="subtitle">아이폰 최적화 UI · 하단 탭 메뉴 · 큰 버튼 · 터치 안정성 개선</div>
      </div>
      <div class="badge ${state.user.loggedIn ? 'ok' : 'warn'}">${state.user.loggedIn ? '학습 세션 활성' : '로그인 필요'}</div>
    </div>

    <div class="desktop-layout">
      <div class="card desktop-menu">
        <div class="menu">
          <button class="${state.activeView==='dashboard'?'active':''}" onclick="setView('dashboard')">홈 대시보드</button>
          <button class="${state.activeView==='lectures'?'active':''}" onclick="setView('lectures')">강의형 학습</button>
          <button class="${state.activeView==='quizzes'?'active':''}" onclick="setView('quizzes')">문제풀이</button>
          <button class="${state.activeView==='game'?'active':''}" onclick="setView('game')">AI 대국</button>
          <button class="${state.activeView==='review'?'active':''}" onclick="setView('review')">복습 / 오답노트</button>
          <button class="${state.activeView==='settings'?'active':''}" onclick="setView('settings')">설정 / 시작</button>
        </div>
      </div>
      <div>${renderView()}</div>
    </div>

    <div class="mobile-nav">
      <div class="mobile-nav-inner">
        <div class="mobile-nav-grid">
          <button class="mobile-tab ${state.activeView==='dashboard'?'active':''}" onclick="setView('dashboard')">홈</button>
          <button class="mobile-tab ${state.activeView==='lectures'?'active':''}" onclick="setView('lectures')">강의</button>
          <button class="mobile-tab ${state.activeView==='quizzes'?'active':''}" onclick="setView('quizzes')">문제</button>
          <button class="mobile-tab ${state.activeView==='game'?'active':''}" onclick="setView('game')">대국</button>
          <button class="mobile-tab ${state.activeView==='review'?'active':''}" onclick="setView('review')">복습</button>
        </div>
      </div>
    </div>
  `;
  if(state.activeView==='game') drawBoard();
}

function renderView(){
  switch(state.activeView){
    case 'dashboard': return renderDashboard();
    case 'lectures': return renderLectures();
    case 'quizzes': return renderQuizzes();
    case 'game': return renderGame();
    case 'review': return renderReview();
    case 'settings': return renderSettings();
    default: return '';
  }
}

function renderDashboard(){
  return `
  <div class="stack">
    <div class="card">
      <div class="space">
        <div>
          <div class="section-title">${state.user.loggedIn ? `${state.user.name}님의 학습 현황` : '시작 설정이 필요합니다'}</div>
          <div class="muted">중급 입문 목표 · 19줄 실전 중심 · 설명형/실전형 AI 포함</div>
        </div>
        <span class="badge">진도 ${percent()}%</span>
      </div>
    </div>
    <div class="grid3">
      <div class="stat"><div class="muted">완료 강의</div><div class="n">${state.progress.completedLectures.length}</div></div>
      <div class="stat"><div class="muted">푼 문제</div><div class="n">${state.progress.solvedQuizzes.length}</div></div>
      <div class="stat"><div class="muted">정답률</div><div class="n">${state.progress.solvedQuizzes.length ? Math.round(state.progress.correctCount / state.progress.solvedQuizzes.length * 100) : 0}%</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="section-title">오늘 추천 학습</div>
        <ul class="list">
          <li>강의: ${nextLecture().title}</li>
          <li>문제: ${nextQuiz().title}</li>
          <li>실전: 설명형 AI로 19줄 1국</li>
        </ul>
      </div>
      <div class="card">
        <div class="section-title">약점 요약</div>
        <div class="hint">${weaknessText()}</div>
      </div>
    </div>
  </div>`;
}

function renderLectures(){
  const lecture = lectures.find(l=>l.id===state.selectedLecture) || lectures[0];
  return `
  <div class="two-col">
    <div class="card">
      <div class="section-title">${lecture.title}</div>
      <div class="badge">${lecture.level}</div>
      <div class="stack" style="margin-top:12px">
        ${lecture.content.map(p=>`<div class="lesson-item" style="cursor:default">${p}</div>`).join('')}
      </div>
      <div class="toolbar" style="margin-top:14px">
        <button class="btn" onclick="completeLecture('${lecture.id}')">이 강의 완료</button>
        <button class="btn secondary" onclick="setView('quizzes'); selectQuizByLecture('${lecture.id}')">관련 문제 풀기</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">강의 목록</div>
      <div class="stack">
      ${lectures.map(l=>`<div class="lesson-item ${state.selectedLecture===l.id?'active':''}" onclick="state.selectedLecture='${l.id}'; saveState(); render()">
        <div class="space"><strong>${l.title}</strong><span class="badge ${state.progress.completedLectures.includes(l.id)?'ok':''}">${state.progress.completedLectures.includes(l.id)?'완료':'대기'}</span></div>
        <div class="small muted">${l.level}</div>
      </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function selectQuizByLecture(id){
  const map = {l1:'q1',l2:'q2',l3:'q3',l4:'q4',l5:'q5'};
  state.selectedQuiz = map[id] || 'q1';
  state.quizResult = null;
  saveState(); render();
}

function renderQuizzes(){
  const quiz = quizzes.find(q=>q.id===state.selectedQuiz) || quizzes[0];
  return `
  <div class="two-col">
    <div class="card">
      <div class="section-title">${quiz.title}</div>
      <div class="muted">${quiz.question}</div>
      <div class="stack" style="margin-top:14px">
        ${quiz.choices.map((c,i)=>`<button class="btn secondary" onclick="answerQuiz('${quiz.id}', ${i})">${i+1}. ${c}</button>`).join('')}
      </div>
      <div style="margin-top:14px">${renderQuizResult()}</div>
    </div>
    <div class="card">
      <div class="section-title">문제 목록</div>
      <div class="stack">
      ${quizzes.map(q=>`<div class="quiz-item ${state.selectedQuiz===q.id?'active':''}" onclick="state.selectedQuiz='${q.id}'; state.quizResult=null; saveState(); render()">
        <div class="space"><strong>${q.title}</strong><span class="badge ${state.progress.solvedQuizzes.includes(q.id)?'ok':''}">${state.progress.solvedQuizzes.includes(q.id)?'풀이함':'미풀이'}</span></div>
      </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderQuizResult(){
  if(!state.quizResult) return '<div class="hint">정답을 선택하면 바로 채점과 해설이 표시됩니다.</div>';
  const r = state.quizResult;
  return `<div class="answer ${r.correct ? 'good' : 'bad'}"><strong>${r.correct ? '정답입니다.' : '틀렸습니다.'}</strong><div style="margin-top:8px">정답: ${r.answerText}</div><div style="margin-top:8px"><strong>풀이</strong><br>${r.explanation}</div></div>`;
}

function answerQuiz(id, choice){
  const quiz = quizzes.find(q=>q.id===id);
  const correct = quiz.correct === choice;
  const firstSolve = !state.progress.solvedQuizzes.includes(id);
  if(firstSolve){
    state.progress.solvedQuizzes.push(id);
    if(correct) state.progress.correctCount++;
    else state.progress.wrongCount++;
  }
  if(!correct){
    state.notes.unshift({id:Date.now(), type:'quiz', title:quiz.title, note:quiz.explanation});
  }
  state.quizResult = { correct, answerText: quiz.choices[quiz.correct], explanation: quiz.explanation };
  saveState(); render();
}

function renderGame(){
  return `
  <div class="stack">
    <div class="card sticky-tools">
      <div class="space">
        <div>
          <div class="section-title">19줄 AI 대국</div>
          <div class="muted">현재 모드: ${state.game.mode === 'tutor' ? '설명형 AI' : '실전형 AI'}</div>
        </div>
        <div class="pillbar">
          <button class="${state.game.mode==='tutor'?'active':''}" onclick="setGameMode('tutor')">설명형</button>
          <button class="${state.game.mode==='practical'?'active':''}" onclick="setGameMode('practical')">실전형</button>
        </div>
      </div>
      <div class="toolbar" style="margin-top:10px">
        <button class="btn" onclick="passTurn()">패스</button>
        <button class="btn secondary" onclick="resetGame()">새 대국</button>
      </div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="notice">아이폰에서는 바둑판을 한 번 가볍게 확대해서 쓰면 터치 정확도가 더 좋아집니다.</div>
        <div class="board-wrap" style="margin-top:10px"><canvas id="board" width="760" height="760"></canvas></div>
      </div>
      <div class="stack">
        <div class="card">
          <div class="section-title">AI 코멘트</div>
          <div class="hint">${state.game.lastComment}</div>
        </div>
        <div class="card">
          <div class="section-title">학습 포인트</div>
          <ul class="list">
            <li>초반에는 귀, 변, 중앙의 우선순위를 의식해 보세요.</li>
            <li>끊기는 돌이 없는지 먼저 확인하세요.</li>
            <li>큰 곳과 급한 곳을 구분하는 습관이 중요합니다.</li>
            <li>흑/백 각각 마지막 착수는 작은 점으로 표시됩니다.</li>
          </ul>
        </div>
      </div>
    </div>
  </div>`;
}

function renderReview(){
  return `
  <div class="stack">
    <div class="card">
      <div class="section-title">오답노트 / 복습</div>
      <div class="muted">틀린 문제와 실수 설명을 저장합니다.</div>
    </div>
    <div class="card">
      ${state.notes.length ? state.notes.map(n=>`<div class="lesson-item" style="cursor:default"><div class="space"><strong>${n.title}</strong><span class="badge">${n.type}</span></div><div class="muted small" style="margin-top:6px">${n.note}</div></div>`).join('') : '<div class="hint">아직 오답노트가 없습니다. 문제를 풀거나 대국에서 실수를 기록하면 여기에 표시됩니다.</div>'}
    </div>
  </div>`;
}

function renderSettings(){
  return `
  <div class="stack">
    <div class="card">
      <div class="section-title">설정 / 시작</div>
      <div class="muted">현재 버전은 아이폰 사용성 개선판입니다.</div>
      <div class="stack" style="margin-top:14px">
        <div>
          <label class="small muted">학습자 이름</label>
          <input type="text" id="username" placeholder="이름 입력" value="${state.user.name || ''}" />
        </div>
        <div class="toolbar">
          <button class="btn" onclick="login()">시작 / 저장</button>
          <button class="btn secondary" onclick="resetAll()">전체 초기화</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">아이폰 사용 팁</div>
      <ol class="list">
        <li>하단 메뉴로 화면 이동이 더 쉬워졌습니다.</li>
        <li>대국 화면에서는 상단 도구 영역이 항상 보입니다.</li>
        <li>홈 화면 아이콘으로 실행하면 앱처럼 쓸 수 있습니다.</li>
      </ol>
    </div>
  </div>`;
}

function setView(view){ state.activeView = view; saveState(); render(); }
function login(){
  const name = document.getElementById('username').value.trim();
  state.user.name = name || '학습자';
  state.user.loggedIn = true;
  saveState(); render();
}
function completeLecture(id){
  if(!state.progress.completedLectures.includes(id)) state.progress.completedLectures.push(id);
  saveState(); render();
}
function resetAll(){
  if(!confirm('모든 학습 기록을 초기화할까요?')) return;
  state = structuredClone(defaultState);
  saveState(); render();
}
function setGameMode(mode){
  state.game.mode = mode;
  state.game.lastComment = mode === 'tutor' ? '설명형 AI로 전환했습니다. 큰 곳과 약한 돌을 같이 보세요.' : '실전형 AI로 전환했습니다. 설명은 줄이고 진행 속도를 높입니다.';
  saveState(); render();
}

/* Board */
const BOARD_SIZE = 19;
const EMPTY=0, BLACK=1, WHITE=2;
const INTERNAL_SIZE = 760;
const MARGIN = 32;
const GAP = (INTERNAL_SIZE - MARGIN*2) / (BOARD_SIZE - 1);

function emptyBoard(){ return Array.from({length:BOARD_SIZE},()=>Array(BOARD_SIZE).fill(EMPTY)); }
let board = emptyBoard();

function rebuildBoardFromMoves(){
  board = emptyBoard();
  for(const mv of state.game.moves){ board[mv.y][mv.x] = mv.color==='black' ? BLACK : WHITE; }
}
function resetGame(){
  state.game.moves = [];
  state.game.currentTurn = 'black';
  state.game.lastComment = '새 대국을 시작했습니다. 첫 수는 귀 쪽 큰 자리부터 의식해 보세요.';
  saveState(); render();
}
function passTurn(){
  state.game.currentTurn = state.game.currentTurn === 'black' ? 'white' : 'black';
  state.game.lastComment = state.game.mode==='tutor' ? '패스를 선택했습니다. 형세상 정말 패스가 필요한지 항상 점검하세요.' : '패스.';
  saveState(); render();
  if(state.game.currentTurn === 'white') setTimeout(aiMove, 220);
}

function drawBoard(){
  const c = document.getElementById('board');
  if(!c) return;
  c.width = INTERNAL_SIZE; c.height = INTERNAL_SIZE;
  rebuildBoardFromMoves();
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,INTERNAL_SIZE,INTERNAL_SIZE);
  ctx.fillStyle = '#d4a15d';
  ctx.fillRect(0,0,INTERNAL_SIZE,INTERNAL_SIZE);
  ctx.strokeStyle = '#7c4a16';
  ctx.lineWidth = 1.2;
  for(let i=0;i<BOARD_SIZE;i++){
    const p = MARGIN + i*GAP;
    ctx.beginPath(); ctx.moveTo(MARGIN,p); ctx.lineTo(INTERNAL_SIZE-MARGIN,p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p,MARGIN); ctx.lineTo(p,INTERNAL_SIZE-MARGIN); ctx.stroke();
  }
  [[3,3],[9,3],[15,3],[3,9],[9,9],[15,9],[3,15],[9,15],[15,15]].forEach(([x,y])=>{
    const px = MARGIN + x*GAP, py = MARGIN + y*GAP;
    ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fillStyle='#4b2e12'; ctx.fill();
  });

  let lastBlack = null, lastWhite = null;
  for(const mv of state.game.moves){ if(mv.color==='black') lastBlack = mv; else lastWhite = mv; }

  for(const mv of state.game.moves){
    const px = MARGIN + mv.x*GAP, py = MARGIN + mv.y*GAP;
    ctx.beginPath(); ctx.arc(px,py,GAP*0.42,0,Math.PI*2);
    ctx.fillStyle = mv.color==='black' ? '#111' : '#f7f7f7';
    ctx.fill();
    ctx.strokeStyle = mv.color==='black' ? '#000' : '#888';
    ctx.lineWidth = 2; ctx.stroke();

    if((lastBlack && mv === lastBlack) || (lastWhite && mv === lastWhite)){
      ctx.beginPath(); ctx.arc(px,py,GAP*0.12,0,Math.PI*2);
      ctx.fillStyle = mv.color==='black' ? '#f7f7f7' : '#111';
      ctx.fill();
    }
  }

  const handlePointer = (clientX, clientY) => {
    const rect = c.getBoundingClientRect();
    const scaleX = c.width / rect.width;
    const scaleY = c.height / rect.height;
    const canvasX = (clientX - rect.left) * scaleX;
    const canvasY = (clientY - rect.top) * scaleY;
    const x = Math.round((canvasX - MARGIN) / GAP);
    const y = Math.round((canvasY - MARGIN) / GAP);
    if(x<0||x>=BOARD_SIZE||y<0||y>=BOARD_SIZE) return;
    const px = MARGIN + x*GAP, py = MARGIN + y*GAP;
    const tolerance = GAP * 0.55;
    if(Math.abs(canvasX - px) > tolerance || Math.abs(canvasY - py) > tolerance) return;
    if(state.game.currentTurn !== 'black') return;
    if(board[y][x] !== EMPTY) return;
    placeStone(x,y,'black');
    if(state.game.currentTurn === 'white') setTimeout(aiMove, 220);
  };

  c.onclick = (e) => handlePointer(e.clientX, e.clientY);
  c.ontouchstart = (e) => {
    const t = e.touches[0];
    if(t){ handlePointer(t.clientX, t.clientY); e.preventDefault(); }
  };
}

function placeStone(x,y,color){
  state.game.moves.push({x,y,color});
  board[y][x] = color==='black' ? BLACK : WHITE;
  state.game.currentTurn = color==='black' ? 'white' : 'black';
  state.game.lastComment = buildComment(x,y,color);
  saveState(); render();
}
function buildComment(x,y,color){
  const cornerDist = Math.min(x+y, x+(18-y), (18-x)+y, (18-x)+(18-y));
  if(state.game.mode === 'practical') return color==='black' ? '착수 완료.' : 'AI 응수 완료.';
  if(cornerDist <= 6) return '귀 쪽 큰 자리에 두었습니다. 초반 기본 감각으로 나쁘지 않습니다.';
  if(x>5 && x<13 && y>5 && y<13) return '중앙 쪽 착수입니다. 초반에는 중앙보다 귀와 변이 더 클 때가 많습니다.';
  return '방향은 무난합니다. 다음 수에서는 약한 돌과 끊김 여부를 함께 확인해 보세요.';
}
function aiMove(){
  rebuildBoardFromMoves();
  const candidates = [];
  for(let y=0;y<BOARD_SIZE;y++){
    for(let x=0;x<BOARD_SIZE;x++){
      if(board[y][x] !== EMPTY) continue;
      let score = 0;
      for(let yy=Math.max(0,y-2); yy<=Math.min(18,y+2); yy++){
        for(let xx=Math.max(0,x-2); xx<=Math.min(18,x+2); xx++){
          if(board[yy][xx] !== EMPTY) score += 3;
        }
      }
      const moveCount = state.game.moves.length;
      if(moveCount < 12){
        const toEdge = Math.min(x,y,18-x,18-y);
        if(toEdge >= 2 && toEdge <= 4) score += 8;
        if(x>5 && x<13 && y>5 && y<13) score -= 6;
      }
      candidates.push({x,y,score:score + Math.random()});
    }
  }
  candidates.sort((a,b)=>b.score-a.score);
  const mv = candidates[0];
  if(mv) placeStone(mv.x,mv.y,'white');
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
render();
</script>
